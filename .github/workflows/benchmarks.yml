name: Benchmarks

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-benchmark-${{ hashFiles('requirements-dev.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-benchmark-
            ${{ runner.os }}-uv-

      - name: Install dependencies
        env:
          SETUPTOOLS_SCM_WRITE_TO_SOURCE: "1"
        run: |
          uv venv
          uv pip install -r requirements-dev.lock
          uv pip install -e .

      - name: Run benchmarks
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          SECRET_KEY: for-testing-only
          DJANGO_SETTINGS_MODULE: config.test_settings
          RUN_BENCHMARKS: "1"
        run: |
          uv run pytest benchmarks/ -m benchmark --benchmark-only \
            --benchmark-json=bench.json -v \
            --benchmark-disable-gc

      - name: Compare to baselines
        if: success()
        run: |
          uv run python benchmarks/compare_to_baseline.py bench.json benchmarks/baselines.json

      - name: Upload benchmark JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-json
          path: bench.json
          retention-days: 30
